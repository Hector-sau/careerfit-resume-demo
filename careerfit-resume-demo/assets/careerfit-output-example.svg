<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="softBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 800 48px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 400 20px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .section-title { font: 800 28px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #111827; }
      .panel-title { font: 800 24px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .label { font: 700 17px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #334155; }
      .body { font: 400 16px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #475569; }
      .small { font: 400 14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .tiny { font: 400 13px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .chip { font: 700 14px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: #1D4ED8; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#softBg)"/>
  <circle cx="1420" cy="115" r="72" fill="#DBEAFE" opacity="0.55"/>
  <circle cx="150" cy="1050" r="96" fill="#CCFBF1" opacity="0.45"/>

  <text x="70" y="86" class="title">CareerFit Resume Demo · 输出示例</text>
  <text x="72" y="122" class="subtitle">输入目标岗位 JD + 个人真实经历，生成可核对来源的结构化求职报告</text>

  <g transform="translate(70 160)">
    <rect x="0" y="0" width="420" height="865" rx="28" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
    <rect x="28" y="28" width="126" height="38" rx="12" fill="#DBEAFE"/>
    <text x="47" y="54" class="chip">用户输入</text>
    <text x="28" y="104" class="section-title">1. 目标岗位 JD</text>
    <rect x="28" y="126" width="364" height="225" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="52" y="164" class="label">HR / 运营实习生</text>
    <text x="52" y="200" class="body">• 协助招聘流程和候选人沟通</text>
    <text x="52" y="231" class="body">• 维护面试安排、名单和入职材料</text>
    <text x="52" y="262" class="body">• 参与社群、活动运营和反馈整理</text>
    <text x="52" y="293" class="body">• 熟悉 Excel、文档和基础数据汇总</text>
    <text x="52" y="323" class="small">来源：用户粘贴的公开 JD 原文</text>

    <text x="28" y="406" class="section-title">2. 个人真实经历</text>
    <rect x="28" y="428" width="364" height="294" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="52" y="466" class="body">• 参与校园招聘宣讲志愿服务</text>
    <text x="52" y="499" class="body">• 负责社团活动报名与签到</text>
    <text x="52" y="532" class="body">• 维护班级社群通知与答疑</text>
    <text x="52" y="565" class="body">• 整理 Excel 名单和反馈表</text>
    <text x="52" y="598" class="body">• 做过课程调研与汇报材料</text>
    <line x1="52" y1="628" x2="368" y2="628" stroke="#E2E8F0"/>
    <text x="52" y="663" class="small">原则：只基于用户提供过的经历</text>
    <text x="52" y="691" class="small">缺少数据时标记“建议补充”</text>

    <rect x="28" y="764" width="364" height="64" rx="18" fill="#ECFEFF" stroke="#99F6E4"/>
    <text x="52" y="792" class="label">最短使用路径</text>
    <text x="52" y="819" class="small">复制 Prompt → 粘贴 JD 和经历 → 得到报告</text>
  </g>

  <g transform="translate(535 235)">
    <text x="0" y="0" class="section-title">AI 处理链路</text>
    <text x="0" y="34" class="subtitle">把零散经历转成岗位证据</text>

    <g transform="translate(0 78)">
      <rect x="0" y="0" width="235" height="86" rx="20" fill="#FFFFFF" stroke="#BFDBFE"/>
      <circle cx="38" cy="43" r="18" fill="#DBEAFE"/>
      <text x="33" y="50" font-family="Arial" font-size="20" font-weight="700" fill="#2563EB">1</text>
      <text x="72" y="35" class="label">JD 要求提取</text>
      <text x="72" y="62" class="small">职责 / 技能 / 关键词</text>
    </g>

    <path d="M118 174 L118 220" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M106 211 L118 224 L130 211" stroke="#94A3B8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(0 230)">
      <rect x="0" y="0" width="235" height="86" rx="20" fill="#FFFFFF" stroke="#99F6E4"/>
      <circle cx="38" cy="43" r="18" fill="#CCFBF1"/>
      <text x="33" y="50" font-family="Arial" font-size="20" font-weight="700" fill="#0F766E">2</text>
      <text x="72" y="35" class="label">履历事项挖掘</text>
      <text x="72" y="62" class="small">经历 → 能力 → 证据</text>
    </g>

    <path d="M118 326 L118 372" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M106 363 L118 376 L130 363" stroke="#94A3B8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(0 382)">
      <rect x="0" y="0" width="235" height="86" rx="20" fill="#FFFFFF" stroke="#DDD6FE"/>
      <circle cx="38" cy="43" r="18" fill="#EDE9FE"/>
      <text x="33" y="50" font-family="Arial" font-size="20" font-weight="700" fill="#7C3AED">3</text>
      <text x="72" y="35" class="label">简历表达生成</text>
      <text x="72" y="62" class="small">保守版 / 增强版</text>
    </g>

    <path d="M118 478 L118 524" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M106 515 L118 528 L130 515" stroke="#94A3B8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(0 534)">
      <rect x="0" y="0" width="235" height="86" rx="20" fill="#FFFFFF" stroke="#FED7AA"/>
      <circle cx="38" cy="43" r="18" fill="#FFEDD5"/>
      <text x="33" y="50" font-family="Arial" font-size="20" font-weight="700" fill="#EA580C">4</text>
      <text x="72" y="35" class="label">建议来源标注</text>
      <text x="72" y="62" class="small">JD / 履历 / 推断</text>
    </g>
  </g>

  <g transform="translate(830 160)">
    <rect x="0" y="0" width="700" height="865" rx="28" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
    <rect x="30" y="30" width="202" height="38" rx="12" fill="#DCFCE7"/>
    <text x="48" y="56" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" fill="#15803D">A. 简历优化结果</text>

    <text x="30" y="112" class="panel-title">履历事项挖掘</text>
    <rect x="30" y="136" width="640" height="148" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="54" y="173" class="label">校园招聘与活动协助</text>
    <text x="54" y="207" class="body">可体现能力：流程执行、沟通协调、数据整理</text>
    <text x="54" y="238" class="body">对应 JD：招聘协同、活动运营、台账维护</text>
    <text x="54" y="267" class="small">需要补充证据：活动记录、报名表、反馈汇总</text>

    <text x="30" y="330" class="panel-title">优化后简历表达</text>
    <rect x="30" y="354" width="640" height="164" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/>
    <text x="54" y="391" class="label">保守版，可直接使用</text>
    <text x="54" y="425" class="body">参与校园招聘及社团活动组织，负责报名名单整理、</text>
    <text x="54" y="456" class="body">通知触达、现场签到和反馈收集，使用 Excel 维护</text>
    <text x="54" y="487" class="body">活动台账并支持基础复盘。</text>

    <rect x="30" y="540" width="640" height="102" rx="18" fill="#FFFBEB" stroke="#FDE68A"/>
    <text x="54" y="578" class="label">增强版，补证据后再用</text>
    <text x="54" y="612" class="body">补充报名人数、到场率、反馈回收量后，再量化效果。</text>

    <rect x="30" y="675" width="260" height="38" rx="12" fill="#DBEAFE"/>
    <text x="48" y="701" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" fill="#1D4ED8">B. 求职建议</text>

    <g transform="translate(30 735)">
      <rect x="0" y="0" width="198" height="90" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
      <text x="20" y="32" class="label">投递建议</text>
      <text x="20" y="62" class="small">建议投递 HR/运营实习</text>
    </g>
    <g transform="translate(248 735)">
      <rect x="0" y="0" width="198" height="90" rx="18" fill="#F0FDFA" stroke="#99F6E4"/>
      <text x="20" y="32" class="label">候选补齐项目</text>
      <text x="20" y="62" class="small">1-3 个月，自主选择</text>
    </g>
    <g transform="translate(466 735)">
      <rect x="0" y="0" width="174" height="90" rx="18" fill="#FEF2F2" stroke="#FECACA"/>
      <text x="20" y="32" class="label">面试风险</text>
      <text x="20" y="62" class="small">准备流程和数据</text>
    </g>
  </g>

  <g transform="translate(70 1060)">
    <rect x="0" y="0" width="1460" height="74" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="30" y="31" class="label">关键边界</text>
    <text x="30" y="58" class="small">简历内容与求职建议分开；不编造经历；不承诺 offer；候选项目由使用者根据时间、兴趣和目标岗位决定。</text>
    <rect x="1025" y="19" width="382" height="36" rx="18" fill="#F1F5F9"/>
    <text x="1050" y="43" class="small">示意图：非真实用户简历或真实 AI 截图</text>
  </g>
</svg>
